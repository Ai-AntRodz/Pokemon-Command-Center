<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw Tactical Command</title>
    <style>
        :root { --neon-blue: #00d2ff; --dark-bg: #000a14; --panel-bg: rgba(0, 20, 40, 0.9); }
        body { margin: 0; background: var(--dark-bg); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
        
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        canvas { border: 2px solid var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        #ui-layer { position: absolute; width: 800px; height: 600px; pointer-events: none; }
        
        #terminal {
            position: absolute; bottom: 20px; right: 20px; width: 260px; height: 130px;
            background: var(--panel-bg); border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 10px; font-size: 11px;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 100%, 0 100%);
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid var(--neon-blue); padding-left: 8px; animation: blink 0.1s ease-in; }
        @keyframes blink { from { opacity: 0; } to { opacity: 1; } }

        #header {
            position: absolute; top: 20px; left: 20px; color: var(--neon-blue);
            text-transform: uppercase; letter-spacing: 2px; border-left: 4px solid var(--neon-blue); padding-left: 15px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<div id="ui-layer">
    <div id="header">
        <div style="font-size: 20px; font-weight: 900;">OpenClaw <span style="color: #fff;">Command</span></div>
        <div style="font-size: 10px; opacity: 0.8;">LINK_STATUS: STABLE</div>
    </div>
    <div id="terminal">
        <div style="font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid rgba(0,210,255,0.3);">TACTICAL_LOG</div>
        <div id="log-content"></div>
    </div>
</div>

<script>
const logContent = document.getElementById('log-content');
function addLog(msg) {
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerText = `> ${msg}`;
    logContent.prepend(entry);
    if(logContent.children.length > 5) logContent.lastChild.remove();
}

// --- TARGETING LOGIC ---
const ASSIGNMENTS = {
    'mewtwo': 'coding',
    'rotom': 'terminal',
    'ditto': 'floppy',
    'unown': 'www',
    'snorlax': 'dummy',
    'smeargle': 'dummy'
};

// --- MASTER LISTS (Set W/H to null for original size) ---
const POKEMON_LIST = [
    { id: 'snorlax', file: 'snorlax.gif',   w: null, h: null },
    { id: 'rotom',   file: 'rotom.gif',     w: null, h: null },
    { id: 'unown',   file: 'unown.gif',     w: null, h: null },
    { id: 'smeargle',file: 'smeargle.gif',  w: null, h: null },
    { id: 'mewtwo',  file: 'mewtwo.gif',    w: null, h: null },
    { id: 'ditto',   file: 'ditto.gif',     w: null, h: null }
];

const ENEMY_LIST = [
    { id: 'coding',  file: 'coding.gif',    w: 70, h: 70, x: 220, y: 160 },
    { id: 'floppy',  file: 'floppy.gif',    w: 35, h: 35, x: 580, y: 160 },
    { id: 'www',     file: 'www.gif',       w: 80, h: 60, x: 220, y: 440 },
    { id: 'terminal',file: 'terminal.webp', w: 85, h: 85, x: 580, y: 440 },
    { id: 'dummy',   file: 'ball',          w: 40, h: 40, x: 400, y: 450 } 
];

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    pixelArt: true,
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

function preload() {
    const baseUrl = window.location.href.replace('index.html', '');
    const assetPath = 'gifs-Sprites/';
    this.load.setPath(baseUrl + assetPath);
    const v = "?v=" + Date.now();
    
    this.load.image('blue', 'trainerblue.gif' + v);
    this.load.setPath(''); 
    this.load.image('ball', 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png');
    this.load.setPath(baseUrl + assetPath);
    
    POKEMON_LIST.forEach(p => this.load.image(p.id, p.file + v));
    ENEMY_LIST.forEach(e => { if(e.id !== 'dummy') this.load.image(e.id, e.file + v); });
}

let belt = {};
let activeNodes = {};

function create() {
    addLog("OS_V12_LOADED");
    this.add.grid(400, 300, 800, 600, 40, 40, 0x000, 0, 0x00d2ff, 0.05);
    this.blue = this.add.image(400, 300, 'blue').setDisplaySize(115, 145);

    POKEMON_LIST.forEach((p, i) => {
        const y = 85 + (i * 85);
        const ball = this.add.image(50, y, 'ball').setDisplaySize(28, 28);
        
        // REFIXED SHAKE: Using a clearer tween
        this.tweens.add({
            targets: ball,
            angle: 15,
            duration: 100,
            yoyo: true,
            repeat: 3,
            hold: 2000 + (Math.random() * 2000),
            repeatDelay: 1000
        });

        const nameText = this.add.text(80, y, p.id.toUpperCase(), { fontSize: '11px', color: '#00d2ff', fontStyle: 'bold' }).setOrigin(0, 0.5);
        belt[p.id] = { ball, nameText, y, busy: false };
    });

    this.time.addEvent({ delay: 3000, callback: strategicDispatch, callbackScope: this, loop: true });
}

function strategicDispatch() {
    POKEMON_LIST.forEach(p => {
        const targetId = ASSIGNMENTS[p.id];
        const targetNode = ENEMY_LIST.find(e => e.id === targetId);
        if (!belt[p.id].busy && !activeNodes[targetId]) {
            launchMission.call(this, p.id, targetNode);
        }
    });
}

function launchMission(aId, node) {
    belt[aId].busy = true;
    activeNodes[node.id] = true;
    belt[aId].ball.setAlpha(0.2);
    addLog(`DEPLOY: ${aId.toUpperCase()}`);

    const ball = this.add.image(50, belt[aId].y, 'ball').setDisplaySize(28, 28);
    this.tweens.add({
        targets: ball, x: node.x, y: node.y, angle: 360, duration: 800,
        onComplete: () => {
            ball.destroy();
            beginBattle.call(this, aId, node);
        }
    });
}

function beginBattle(aId, node) {
    const pConf = POKEMON_LIST.find(p => p.id === aId);
    if(!pConf) return;

    const enemyImg = (node.id === 'dummy' || !this.textures.exists(node.id)) ? 'ball' : node.id;
    const pokeImg = this.textures.exists(aId) ? aId : 'ball';

    const enemy = this.add.image(node.x + 50, node.y, enemyImg);
    const poke = this.add.image(node.x - 50, node.y, pokeImg);

    // Apply scaling ONLY if defined, else use original size
    if (node.w && node.h) enemy.setDisplaySize(node.w, node.h);
    if (pConf.w && pConf.h) poke.setDisplaySize(pConf.w, pConf.h);
    
    const hY = node.h ? node.h : 50; // Fallback for HP position
    const bg = this.add.rectangle(node.x + 50, node.y - (hY/2 + 12), 60, 4, 0x002244);
    const hp = this.add.rectangle(node.x + 50, node.y - (hY/2 + 12), 60, 4, 0x00d2ff);

    const combatTween = this.tweens.add({
        targets: poke, x: '+=30', duration: 200, yoyo: true, repeat: -1,
        onYoyo: () => {
            if (hp && hp.active && hp.width > 0) {
                hp.width -= 15;
                const spark = this.add.star(node.x + 40, node.y, 5, 2, 8, 0x00d2ff);
                this.tweens.add({ targets: spark, scale: 2, alpha: 0, duration: 150, onComplete: () => spark.destroy() });
                if (enemy && enemy.active) {
                    enemy.setTint(0x00d2ff);
                    this.time.delayedCall(50, () => { if(enemy && enemy.active) enemy.clearTint(); });
                }
            }
            if (hp && hp.width <= 0) {
                combatTween.stop();
                addLog(`TARGET_DOWN: ${node.id.toUpperCase()}`);
                this.cameras.main.shake(150, 0.005); 
                if(enemy) enemy.destroy(); 
                if(hp) hp.destroy(); 
                if(bg) bg.destroy();
                retreat.call(this, aId, node.id, poke);
            }
        }
    });
}

function retreat(aId, nodeId, sprite) {
    if(!sprite || !sprite.active) {
        belt[aId].busy = false; belt[aId].ball.setAlpha(1);
        delete activeNodes[nodeId]; return;
    }
    this.tweens.add({
        targets: sprite, x: 50, y: belt[aId].y, alpha: 0, scale: 0, duration: 600,
        onComplete: () => {
            if(sprite) sprite.destroy();
            belt[aId].busy = false;
            belt[aId].ball.setAlpha(1);
            delete activeNodes[nodeId];
        }
    });
}

function update() {
    if(this.blue && this.blue.active) {
        this.blue.y = 300 + Math.sin(this.time.now / 1000) * 10;
    }
}
</script>
</body>
</html>
