<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw Command Center - v9</title>
    <style>
        body { margin: 0; background: #01050a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { image-rendering: pixelated; border: 4px solid #112244; }
        #terminal-box { 
            position: absolute; bottom: 20px; right: 20px; width: 280px; height: 120px; 
            background: rgba(0, 8, 20, 0.95); border: 1px solid #00aaff; color: #00aaff; 
            font-family: monospace; font-size: 10px; padding: 8px; overflow: hidden;
            pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<div id="terminal-box"><div id="log-content"></div></div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    pixelArt: true,
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// --- UPDATED HARD SCALING ---
const ASSET_SCALES = {
    'snorlax': { w: 60, h: 60 },
    'rotom':   { w: 50, h: 50 },
    'unown':   { w: 45, h: 45 },
    'smeargle':{ w: 55, h: 55 },
    'mewtwo':  { w: 60, h: 75 },
    'ditto':   { w: 50, h: 45 },
    'coding':  { w: 65, h: 65 }, // Adjusted Laptop
    'floppy':  { w: 40, h: 40 }, // Forced small Floppy
    'terminal':{ w: 40, h: 40 },
    'blue':    { w: 85, h: 85 },
    'ball':    { w: 25, h: 25 }
};

const AGENTS = [
    { key: 'snorlax', file: 'snorlax.gif' },
    { key: 'rotom', file: 'rotom.gif' },
    { key: 'unown', file: 'unown.gif' },
    { key: 'smeargle', file: 'smeargle.gif' },
    { key: 'mewtwo', file: 'mewtwo.gif' },
    { key: 'ditto', file: 'ditto.gif' }
];

const ENEMIES = {
    LAPTOP: { key: 'coding', file: 'coding.gif', x: 250, y: 160 },
    FLOPPY: { key: 'floppy', file: 'floppy.gif', x: 550, y: 160 },
    TERM:   { key: 'terminal', file: 'terminal.webp', x: 400, y: 460 }
};

function preload() {
    const path = 'gifs-Sprites/';

    this.load.on('loaderror', (file) => console.warn('Missing File:', file.src));

    // Load static assets
    this.load.image('blue', path + 'trainerblue.gif');
    this.load.image('ball', 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png');
    
    // Load Agents using new naming convention
    AGENTS.forEach(a => this.load.image(a.key, path + a.file));
    
    // Load Enemies using new naming convention
    Object.values(ENEMIES).forEach(e => this.load.image(e.key, path + e.file));
}

let belt = {};
let activeTasks = {};

function create() {
    this.add.grid(400, 300, 800, 600, 40, 40, 0x000000, 0, 0x00aaff, 0.1);
    
    const bS = ASSET_SCALES['blue'];
    this.blue = this.add.image(400, 300, 'blue').setDisplaySize(bS.w, bS.h);

    AGENTS.forEach((a, i) => {
        const y = 80 + (i * 85);
        const ball = this.add.image(50, y, 'ball').setDisplaySize(25, 25);
        const txt = this.add.text(80, y, a.key.toUpperCase(), {fontSize:'11px', color:'#00aaff', fontStyle:'bold'}).setOrigin(0,0.5);
        belt[a.key] = { ball, txt, y, isBusy: false };
    });

    this.time.addEvent({ delay: 3500, callback: autoManager, callbackScope: this, loop: true });
}

function autoManager() {
    const available = AGENTS.filter(a => !belt[a.key].isBusy);
    const freeNodes = Object.keys(ENEMIES).filter(key => !activeTasks[key]);

    if (available.length > 0 && freeNodes.length > 0) {
        const agent = Phaser.Utils.Array.GetRandom(available);
        const nodeKey = Phaser.Utils.Array.GetRandom(freeNodes);
        deployAgent.call(this, agent.key, nodeKey);
    }
}

function deployAgent(aKey, nKey) {
    const node = ENEMIES[nKey];
    const bItem = belt[aKey];
    bItem.isBusy = true;
    activeTasks[nKey] = true;
    
    bItem.ball.setAlpha(0.2);
    const flyBall = this.add.image(50, bItem.y, 'ball').setDisplaySize(25, 25);

    this.tweens.add({
        targets: flyBall, x: node.x, y: node.y,
        angle: 360, duration: 700,
        onComplete: () => {
            flyBall.destroy();
            startBattle.call(this, aKey, nKey);
        }
    });
}

function startBattle(aKey, nKey) {
    const nodeData = ENEMIES[nKey];
    const eS = ASSET_SCALES[nodeData.key];
    const pS = ASSET_SCALES[aKey];
    
    const enemy = this.add.image(nodeData.x + 50, nodeData.y, nodeData.key).setDisplaySize(eS.w, eS.h);
    const agent = this.add.image(nodeData.x - 50, nodeData.y, aKey).setDisplaySize(pS.w, pS.h);
    
    // UI: Health Bar Background and Fill (Reset every time)
    const hbBg = this.add.rectangle(nodeData.x + 50, nodeData.y - (eS.h/2 + 15), 60, 5, 0x112244);
    const hb = this.add.rectangle(nodeData.x + 50, nodeData.y - (eS.h/2 + 15), 60, 5, 0x00ffaa);
    
    this.tweens.add({
        targets: agent, x: '+=25', duration: 180, yoyo: true, repeat: -1,
        onYoyo: () => {
            hb.width -= 6; // Damage
            enemy.setTint(0x00aaff);
            this.time.delayedCall(50, () => enemy.clearTint());
            
            if (hb.width <= 0) {
                this.tweens.killTweensOf(agent);
                enemy.destroy(); hb.destroy(); hbBg.destroy();
                finishMission.call(this, aKey, nKey, agent);
            }
        }
    });
}

function finishMission(aKey, nKey, sprite) {
    this.tweens.add({
        targets: sprite, x: 50, y: belt[aKey].y,
        alpha: 0, scale: 0, duration: 600,
        onComplete: () => {
            sprite.destroy();
            belt[aKey].isBusy = false;
            belt[aKey].ball.setAlpha(1);
            delete activeTasks[nKey]; 
        }
    });
}

function update() {
    this.blue.y = 300 + Math.sin(this.time.now / 1000) * 5;
}
</script>
</body>
</html>
