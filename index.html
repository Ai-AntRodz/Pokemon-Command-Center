<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw Command Center</title>
    <style>
        body { margin: 0; background: #01050a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #00aaff; box-shadow: 0 0 20px #00aaff33; }
        #terminal { position: absolute; bottom: 15px; right: 15px; width: 250px; height: 100px; background: rgba(0,10,25,0.9); border: 1px solid #00aaff; color: #00aaff; font-family: monospace; font-size: 10px; padding: 10px; pointer-events: none; overflow: hidden; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<div id="terminal"><div id="log"></div></div>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    pixelArt: true,
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// Force specific sizes for problematic GIFs
const SCALES = {
    'snorlax': {w:60, h:60}, 
    'rotom': {w:50, h:50}, 
    'unown': {w:45, h:45},
    'smeargle': {w:55, h:55}, 
    'mewtwo': {w:60, h:80}, 
    'ditto': {w:50, h:45},
    'coding': {w:65, h:65},  // Laptop Scale
    'floppy': {w:40, h:40},  // Hard Small Scale for Floppy
    'terminal': {w:80, h:80},
    'blue': {w:70, h:90}
};

const AGENTS = ['snorlax', 'rotom', 'unown', 'smeargle', 'mewtwo', 'ditto'];
const NODES = {
    LAPTOP: { key: 'coding', x: 250, y: 160 },
    FLOPPY: { key: 'floppy', x: 550, y: 160 },
    TERM:   { key: 'terminal', x: 400, y: 460 }
};

function preload() {
    const path = 'gifs-Sprites/';
    const cb = '?v=' + Date.now(); // Cache Buster to force new names

    this.load.image('blue', path + 'trainerblue.gif' + cb);
    this.load.image('ball', 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png');
    
    // Load lowercase names per your update
    AGENTS.forEach(a => this.load.image(a, path + a + '.gif' + cb));
    this.load.image('coding', path + 'coding.gif' + cb);
    this.load.image('floppy', path + 'floppy.gif' + cb);
    this.load.image('terminal', path + 'terminal.webp' + cb);

    this.load.on('loaderror', (file) => console.warn("Asset skipped:", file.key));
}

let belt = {};
let tasks = {};

function create() {
    this.add.grid(400, 300, 800, 600, 40, 40, 0x000, 0, 0x00aaff, 0.1);
    this.blue = this.add.image(400, 300, 'blue').setDisplaySize(SCALES.blue.w, SCALES.blue.h);

    AGENTS.forEach((a, i) => {
        const y = 80 + (i * 85);
        const ball = this.add.image(50, y, 'ball').setDisplaySize(25, 25);
        const txt = this.add.text(80, y, a.toUpperCase(), {fontSize:'10px', color:'#00aaff'}).setOrigin(0,0.5);
        belt[a] = { ball, txt, y, busy: false };
    });

    this.time.addEvent({ delay: 3000, callback: manager, callbackScope: this, loop: true });
}

function manager() {
    const freeAgent = AGENTS.find(a => !belt[a].busy);
    const freeNode = Object.keys(NODES).find(n => !tasks[n]);
    if (freeAgent && freeNode) deploy(freeAgent, freeNode);
}

function deploy(aKey, nKey) {
    const node = NODES[nKey];
    belt[aKey].busy = true;
    tasks[nKey] = true;
    belt[aKey].ball.setAlpha(0.2);

    const ball = this.add.image(50, belt[aKey].y, 'ball').setDisplaySize(25, 25);
    this.tweens.add({
        targets: ball, x: node.x, y: node.y, angle: 360, duration: 600,
        onComplete: () => { ball.destroy(); start(aKey, nKey); }
    });
}

function start(aKey, nKey) {
    const n = NODES[nKey];
    const eS = SCALES[n.key];
    const pS = SCALES[aKey];

    const enemy = this.add.image(n.x + 50, n.y, n.key).setDisplaySize(eS.w, eS.h);
    const agent = this.add.image(n.x - 50, n.y, aKey).setDisplaySize(pS.w, pS.h);
    
    // UI: Persistent Health Bar Reset
    const bg = this.add.rectangle(n.x + 50, n.y - (eS.h/2 + 10), 60, 4, 0x112244);
    const hb = this.add.rectangle(n.x + 50, n.y - (eS.h/2 + 10), 60, 4, 0x00ffaa);

    this.tweens.add({
        targets: agent, x: '+=20', duration: 200, yoyo: true, repeat: -1,
        onYoyo: () => {
            hb.width -= 10;
            enemy.setTint(0x00aaff);
            this.time.delayedCall(50, () => enemy.clearTint());
            if (hb.width <= 0) {
                this.tweens.killTweensOf(agent);
                enemy.destroy(); hb.destroy(); bg.destroy();
                exit(aKey, nKey, agent);
            }
        }
    });
}

function exit(aKey, nKey, sprite) {
    this.tweens.add({
        targets: sprite, x: 50, y: belt[aKey].y, alpha: 0, scale: 0, duration: 600,
        onComplete: () => {
            sprite.destroy();
            belt[aKey].busy = false;
            belt[aKey].ball.setAlpha(1);
            delete tasks[nKey];
        }
    });
}

function update() { this.blue.y = 300 + Math.sin(this.time.now / 1000) * 5; }
</script>
</body>
</html>
