<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw Tactical Command</title>
    <style>
        :root { --neon-blue: #00d2ff; --dark-bg: #000a14; --panel-bg: rgba(0, 20, 40, 0.9); }
        body { margin: 0; background: var(--dark-bg); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* Cyber CRT Overlay */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        canvas { border: 2px solid var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }

        #ui-layer { position: absolute; width: 800px; height: 600px; pointer-events: none; }
        
        #terminal {
            position: absolute; bottom: 20px; right: 20px; width: 260px; height: 130px;
            background: var(--panel-bg); border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 10px; font-size: 11px;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 100%, 0 100%);
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid var(--neon-blue); padding-left: 8px; animation: blink 0.1s ease-in; }
        @keyframes blink { from { opacity: 0; } to { opacity: 1; } }

        #header {
            position: absolute; top: 20px; left: 20px; color: var(--neon-blue);
            text-transform: uppercase; letter-spacing: 2px; border-left: 4px solid var(--neon-blue); padding-left: 15px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<div id="ui-layer">
    <div id="header">
        <div style="font-size: 20px; font-weight: 900;">OpenClaw <span style="color: #fff;">Command</span></div>
        <div style="font-size: 10px; opacity: 0.8;">LINK_STATUS: STABLE</div>
    </div>
    <div id="terminal">
        <div style="font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid rgba(0,210,255,0.3);">TACTICAL_LOG</div>
        <div id="log-content"></div>
    </div>
</div>

<script>
const logContent = document.getElementById('log-content');
function addLog(msg) {
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerText = `> ${msg}`;
    logContent.prepend(entry);
    if(logContent.children.length > 5) logContent.lastChild.remove();
}

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    pixelArt: true,
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// --- UPDATED FILENAMES & HARD SCALES ---
const SCALES = {
    'blue': {w:115, h:145}, 
    'snorlax': {w:60, h:60}, 
    'rotom': {w:50, h:50}, 
    'unown': {w:45, h:45},
    'smeargle': {w:55, h:55}, 
    'mewtwo': {w:70, h:90}, 
    'ditto': {w:55, h:50},
    'coding': {w:70, h:70}, 
    'floppy': {w:35, h:35}, // Tiny Floppy
    'terminal': {w:85, h:85}, 
    'www': {w:80, h:60}
};

const AGENTS = ['snorlax', 'rotom', 'unown', 'smeargle', 'mewtwo', 'ditto'];
const ENEMY_NODES = {
    A: { key: 'coding', file: 'coding.gif', x: 220, y: 160 },
    B: { key: 'floppy', file: 'floppy.gif', x: 580, y: 160 },
    C: { key: 'www',    file: 'www.gif',    x: 220, y: 440 },
    D: { key: 'terminal', file: 'terminal.webp', x: 580, y: 440 }
};

function preload() {
    const path = 'gifs-Sprites/';
    const v = "?v=" + Date.now();
    
    // Fail-safe: Force start if loading takes more than 5 seconds
    this.time.delayedCall(5000, () => {
        if (!this.scene.isActive()) {
            console.warn("Loader timeout - forcing start.");
            this.scene.start();
        }
    });

    this.load.image('blue', path + 'trainerblue.gif' + v);
    this.load.image('ball', 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png');
    
    AGENTS.forEach(k => this.load.image(k, path + k + '.gif' + v));
    Object.values(ENEMY_NODES).forEach(n => this.load.image(n.key, path + n.file + v));

    this.load.on('loaderror', (file) => {
        addLog(`LOAD_FAIL: ${file.key}`);
    });
}

let belt = {};
let activeTasks = {};

function create() {
    addLog("SYSTEM_BOOT_SUCCESS");
    this.add.grid(400, 300, 800, 600, 40, 40, 0x000, 0, 0x00d2ff, 0.05);

    // Leader Blue
    const bS = SCALES.blue;
    this.blue = this.add.image(400, 300, 'blue').setDisplaySize(bS.w, bS.h);

    // Sidebar
    AGENTS.forEach((key, i) => {
        const y = 85 + (i * 85);
        const ball = this.add.image(50, y, 'ball').setDisplaySize(28, 28);
        const nameText = this.add.text(80, y, key.toUpperCase(), { fontSize: '11px', color: '#00d2ff', fontStyle: 'bold' }).setOrigin(0, 0.5);
        belt[key] = { ball, nameText, y, busy: false };
    });

    this.time.addEvent({ delay: 3500, callback: autoDispatch, callbackScope: this, loop: true });
}

function autoDispatch() {
    const freeAgent = AGENTS.find(a => !belt[a].busy);
    const freeNodeKey = Object.keys(ENEMY_NODES).find(k => !activeTasks[k]);

    if (freeAgent && freeNodeKey) {
        launchMission.call(this, freeAgent, freeNodeKey);
    }
}

function launchMission(aKey, nKey) {
    const node = ENEMY_NODES[nKey];
    belt[aKey].busy = true;
    activeTasks[nKey] = true;
    belt[aKey].ball.setAlpha(0.2);

    addLog(`MISSION_START: ${aKey.toUpperCase()}`);

    const ball = this.add.image(50, belt[aKey].y, 'ball').setDisplaySize(28, 28);
    this.tweens.add({
        targets: ball, x: node.x, y: node.y, angle: 360, duration: 800,
        onComplete: () => {
            ball.destroy();
            beginBattle.call(this, aKey, nKey);
        }
    });
}

function beginBattle(aKey, nKey) {
    const node = ENEMY_NODES[nKey];
    const eS = SCALES[node.key] || {w:50, h:50};
    const pS = SCALES[aKey] || {w:50, h:50};

    // Check if texture actually loaded, else use ball placeholder
    const enemyImg = this.textures.exists(node.key) ? node.key : 'ball';
    const pokeImg = this.textures.exists(aKey) ? aKey : 'ball';

    const enemy = this.add.image(node.x + 50, node.y, enemyImg).setDisplaySize(eS.w, eS.h);
    const poke = this.add.image(node.x - 50, node.y, pokeImg).setDisplaySize(pS.w, pS.h);
    
    const bg = this.add.rectangle(node.x + 50, node.y - (eS.h/2 + 12), 60, 4, 0x002244);
    const hp = this.add.rectangle(node.x + 50, node.y - (eS.h/2 + 12), 60, 4, 0x00d2ff);

    this.tweens.add({
        targets: poke, x: '+=20', duration: 200, yoyo: true, repeat: -1,
        onYoyo: () => {
            hp.width -= 12;
            enemy.setTint(0x00d2ff);
            this.time.delayedCall(50, () => enemy.clearTint());
            
            if (hp.width <= 0) {
                addLog(`TARGET_DOWN: ${node.key.toUpperCase()}`);
                this.tweens.killTweensOf(poke);
                enemy.destroy(); hp.destroy(); bg.destroy();
                retreat.call(this, aKey, nKey, poke);
            }
        }
    });
}

function retreat(aKey, nKey, sprite) {
    this.tweens.add({
        targets: sprite, x: 50, y: belt[aKey].y, alpha: 0, scale: 0, duration: 600,
        onComplete: () => {
            sprite.destroy();
            belt[aKey].busy = false;
            belt[aKey].ball.setAlpha(1);
            delete activeTasks[nKey];
        }
    });
}

function update() {
    this.blue.y = 300 + Math.sin(this.time.now / 1000) * 10;
}
</script>
</body>
</html>
