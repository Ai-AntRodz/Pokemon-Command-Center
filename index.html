<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw Tactical Command - Blue Protocol</title>
    <style>
        body { margin: 0; background: #01050a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { image-rendering: pixelated; border: 4px solid #112244; box-shadow: 0 0 40px #0055ff33; }
        #hud-top { position: absolute; top: 20px; left: 20px; color: #00aaff; font-family: 'Courier New', monospace; pointer-events: none; text-shadow: 0 0 5px #00aaff; }
        #terminal-box { 
            position: absolute; bottom: 25px; right: 25px; width: 300px; height: 140px; 
            background: rgba(0, 5, 15, 0.9); border: 2px solid #00aaff; color: #00aaff; 
            font-family: 'Courier New', monospace; font-size: 11px; padding: 10px; overflow: hidden;
            box-shadow: 0 0 15px #00aaff44;
        }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #00aaff; padding-left: 5px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<div id="hud-top">
    <div style="font-size: 18px; letter-spacing: 2px;">PROTOCOL: <span style="color:#fff">BLUE_UNIT</span></div>
    <div style="font-size: 10px; color: #4488ff;">SYSTEM_STATUS: STABLE</div>
</div>

<div id="terminal-box">
    <div style="border-bottom: 1px solid #00aaff; margin-bottom: 5px; font-weight: bold; font-size: 10px;">[ LOG_STREAM ]</div>
    <div id="log-content"></div>
</div>

<script>
// UI Log Function
function updateLog(agent, task, status) {
    const logContent = document.getElementById('log-content');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    const time = new Date().toLocaleTimeString([], { hour12: false, minute: '2-digit', second: '2-digit' });
    entry.innerHTML = `[${time}] ${agent.toUpperCase()}: ${status} >> ${task}`;
    logContent.prepend(entry);
    if (logContent.children.length > 6) logContent.lastChild.remove();
}

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    pixelArt: true,
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// Global scale for all GIFs to prevent overlapping
const SPRITE_SCALE = 0.6; 

const NODES = {
    CODING:  { x: 250, y: 180, name: 'DEV_LAPTOP', enemy: 'codingOn' },
    LEGACY:  { x: 550, y: 180, name: 'FLOPPY_DISK', enemy: 'FLOPPYOn' },
    SYSTEM:  { x: 400, y: 450, name: 'CMD_TERMINAL', enemy: 'terminalOnTest' }
};

function preload() {
    // Correct Folder Path from your GitHub
    const path = 'gifs-Sprites/';

    // Central Unit
    this.load.image('blue', path + 'trainerblue.gif'); 
    
    // UI Assets
    this.load.image('ball', 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png');
    
    // Agents (Matching your GitHub Case-Sensitivity)
    this.load.image('smeargle', path + 'smeargleOn.gif'); 
    this.load.image('unown', path + 'unown-aOn.gif'); 
    this.load.image('rotom', path + 'rotomOn.gif'); 
    this.load.image('snorlax', path + 'snorlaxOn.gif'); 
    this.load.image('mewtwo', path + 'mewtwoOn.gif'); 
    this.load.image('ditto', path + 'dittoOn.gif'); 

    // Enemies
    this.load.image('codingOn', path + 'codingOn.gif'); 
    this.load.image('FLOPPYOn', path + 'FLOPPYOn.gif'); 
    this.load.image('terminalOnTest', path + 'terminalOnTest.webp'); 
}

let beltBalls = {};
let activeBattles = {};

function create() {
    const scene = this;

    // Background Grid
    const g = this.add.graphics();
    g.lineStyle(1, 0x00aaff, 0.08);
    for(let i=0; i<800; i+=40) g.lineBetween(i, 0, i, 600);
    for(let i=0; i<600; i+=40) g.lineBetween(0, i, 800, i);

    // Blue Unit (Scaled down slightly)
    this.blue = this.add.image(400, 300, 'blue').setScale(1.2);

    // Sidebar Belt
    const agentList = ['Snorlax', 'Rotom', 'Unown', 'Smeargle', 'Mewtwo', 'Ditto'];
    agentList.forEach((name, i) => {
        const yPos = 80 + (i * 85);
        const ball = this.add.image(50, yPos, 'ball').setScale(1.5);
        const label = this.add.text(80, yPos, name.toUpperCase(), { fontSize: '10px', color: '#00aaff' }).setOrigin(0, 0.5);
        beltBalls[name.toLowerCase()] = { ball, label, y: yPos, fullName: name };
    });

    // Deploy events
    this.time.delayedCall(1000, () => deploy('smeargle', 'CODING'));
    this.time.delayedCall(4000, () => deploy('unown', 'SYSTEM'));
    this.time.delayedCall(7000, () => deploy('rotom', 'LEGACY'));
}

function deploy(agentKey, nodeKey) {
    const scene = game.scene.scenes[0];
    const node = NODES[nodeKey];
    const beltItem = beltBalls[agentKey];
    
    if(!beltItem) return;

    updateLog(beltItem.fullName, node.name, 'DEPLOY');
    beltItem.ball.setVisible(false);
    beltItem.label.setAlpha(0.2);

    const flyBall = scene.add.image(50, beltItem.y, 'ball').setScale(1.5);
    scene.tweens.add({
        targets: flyBall, x: node.x, y: node.y,
        angle: 720, duration: 800, ease: 'Power2',
        onComplete: () => {
            flyBall.destroy();
            startBattle(agentKey, nodeKey);
        }
    });
}

function startBattle(agentKey, nodeKey) {
    const scene = game.scene.scenes[0];
    const node = NODES[nodeKey];
    const fullName = beltBalls[agentKey].fullName;

    updateLog(fullName, node.name, 'ENGAGED');

    // Create Enemy
    const enemy = scene.add.image(node.x + 40, node.y, node.enemy).setScale(SPRITE_SCALE);
    const hbBg = scene.add.rectangle(node.x + 40, node.y - 50, 60, 4, 0x112244);
    const hbFill = scene.add.rectangle(node.x + 40, node.y - 50, 60, 4, 0x00ffaa);

    // Create Agent
    const poke = scene.add.image(node.x - 40, node.y, agentKey).setScale(SPRITE_SCALE);

    activeBattles[agentKey] = { poke, enemy, hbFill, hbBg, nodeKey, fullName };

    scene.tweens.add({
        targets: poke, x: '+=20', duration: 200, yoyo: true, repeat: -1,
        onYoyo: () => {
            if (hbFill.scaleX > 0) {
                hbFill.scaleX -= 0.05;
                enemy.setTint(0xff0000);
                scene.time.delayedCall(50, () => enemy.clearTint());
            } else {
                finishBattle(agentKey);
            }
        }
    });
}

function finishBattle(agentKey) {
    const scene = game.scene.scenes[0];
    const b = activeBattles[agentKey];
    updateLog(b.fullName, NODES[b.nodeKey].name, 'SUCCESS');

    b.enemy.destroy(); b.hbFill.destroy(); b.hbBg.destroy();

    scene.tweens.add({
        targets: b.poke, x: 50, y: beltBalls[agentKey].y,
        scale: 0.1, alpha: 0, duration: 600,
        onComplete: () => {
            b.poke.destroy();
            beltBalls[agentKey].ball.setVisible(true);
            beltBalls[agentKey].label.setAlpha(1);
            delete activeBattles[agentKey];
        }
    });
}

function update() {
    this.blue.y = 300 + Math.sin(this.time.now / 1000) * 5;
}
</script>
</body>
</html>
