<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw Tactical Command - Blue Protocol</title>
    <style>
        body { margin: 0; background: #01050a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { image-rendering: pixelated; border: 4px solid #112244; box-shadow: 0 0 40px #0055ff33; }
        
        #hud-top { position: absolute; top: 20px; left: 20px; color: #00aaff; font-family: 'Courier New', monospace; pointer-events: none; text-shadow: 0 0 5px #00aaff; }
        
        #terminal-box { 
            position: absolute; bottom: 25px; right: 25px; width: 300px; height: 140px; 
            background: rgba(0, 5, 15, 0.9); border: 2px solid #00aaff; color: #00aaff; 
            font-family: 'Courier New', monospace; font-size: 11px; padding: 10px; overflow: hidden;
            box-shadow: 0 0 15px #00aaff44;
        }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #00aaff; padding-left: 5px; animation: scanline 0.2s linear; }
        @keyframes scanline { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<div id="hud-top">
    <div style="font-size: 18px; letter-spacing: 2px;">PROTOCOL: <span style="color:#fff">BLUE_UNIT</span></div>
    <div style="font-size: 10px; color: #4488ff;">SYSTEM_STATUS: OVERRIDE_ACTIVE</div>
</div>

<div id="terminal-box">
    <div style="border-bottom: 1px solid #00aaff; margin-bottom: 5px; font-weight: bold; font-size: 10px;">[ BLUE_CORE_LOG_STREAM ]</div>
    <div id="log-content"></div>
</div>

<script>
function updateLog(agent, task, status) {
    const logContent = document.getElementById('log-content');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    const time = new Date().toLocaleTimeString([], { hour12: false, minute: '2-digit', second: '2-digit' });
    entry.innerHTML = `[${time}] ${agent.toUpperCase()}: ${status} >> ${task}`;
    logContent.prepend(entry);
    if (logContent.children.length > 5) logContent.lastChild.remove();
}

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    pixelArt: true,
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

const NODES = {
    CODING:  { x: 220, y: 150, name: 'DEV_LAPTOP', enemy: 'codingOn' },
    LEGACY:  { x: 580, y: 150, name: 'FLOPPY_DISK', enemy: 'FLOPPYOn' },
    SYSTEM:  { x: 400, y: 480, name: 'CMD_TERMINAL', enemy: 'terminalOnTest' }
};

function preload() {
    // Correctly routing to your 'gifs-Sprites' folder
    // Central Unit
    this.load.image('blue', 'gifs-Sprites/trainerblue.gif'); //
    
    // Tactical Assets
    this.load.image('ball', 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png');
    
    // Agent GIFs 
    this.load.image('smeargle', 'gifs-Sprites/smeargleOn.gif'); //
    this.load.image('unown', 'gifs-Sprites/unown-aOn.gif'); //
    this.load.image('rotom', 'gifs-Sprites/rotomOn.gif'); //
    this.load.image('snorlax', 'gifs-Sprites/snorlaxOn.gif'); //
    this.load.image('mewtwo', 'gifs-Sprites/mewtwoOn.gif'); //
    this.load.image('ditto', 'gifs-Sprites/dittoOn.gif'); //

    // Enemy GIFs
    this.load.image('codingOn', 'gifs-Sprites/codingOn.gif'); //
    this.load.image('FLOPPYOn', 'gifs-Sprites/FLOPPYOn.gif'); //
    this.load.image('terminalOnTest', 'gifs-Sprites/terminalOnTest.webp'); //
}

let beltBalls = {};
let activeBattles = {};

function create() {
    const scene = this;

    // Background Grid
    const g = this.add.graphics();
    g.lineStyle(1, 0x00aaff, 0.08);
    for(let i=0; i<800; i+=40) g.lineBetween(i, 0, i, 600);
    for(let i=0; i<600; i+=40) g.lineBetween(0, i, 800, i);

    // Blue Unit
    this.blue = this.add.image(400, 300, 'blue').setScale(1.5);

    // Sidebar Belt
    const agentList = ['Snorlax', 'Rotom', 'Unown', 'Smeargle', 'Mewtwo', 'Ditto'];
    agentList.forEach((name, i) => {
        const yPos = 60 + (i * 95);
        const ball = this.add.image(50, yPos, 'ball').setScale(2);
        const label = this.add.text(85, yPos, name.toUpperCase(), { fontSize: '11px', color: '#00aaff' }).setOrigin(0, 0.5);

        beltBalls[name.toLowerCase()] = { ball, label, y: yPos, fullName: name };
    });

    // Test sequence
    this.time.delayedCall(1500, () => deploy('smeargle', 'CODING'));
    this.time.delayedCall(5000, () => deploy('rotom', 'LEGACY'));
}

function deploy(agentKey, nodeKey) {
    const scene = game.scene.scenes[0];
    const node = NODES[nodeKey];
    const beltItem = beltBalls[agentKey];
    
    updateLog(beltItem.fullName, node.name, 'DEPLOY_INIT');

    beltItem.ball.setVisible(false);
    beltItem.label.setAlpha(0.2);

    const flyBall = scene.add.image(50, beltItem.y, 'ball').setScale(2);
    scene.tweens.add({
        targets: flyBall, x: node.x, y: node.y,
        angle: 720, duration: 800, ease: 'Cubic.easeOut',
        onComplete: () => {
            flyBall.destroy();
            startBattle(agentKey, nodeKey);
        }
    });
}

function startBattle(agentKey, nodeKey) {
    const scene = game.scene.scenes[0];
    const node = NODES[nodeKey];
    const fullName = beltBalls[agentKey].fullName;

    updateLog(fullName, node.name, 'EXE_ATTACK');

    const enemy = scene.add.image(node.x + 50, node.y, node.enemy).setScale(0.7);
    const hbBg = scene.add.rectangle(node.x + 50, node.y - 65, 80, 6, 0x112244);
    const hbFill = scene.add.rectangle(node.x + 50, node.y - 65, 80, 6, 0x00ffaa);
    const poke = scene.add.image(node.x - 50, node.y, agentKey).setScale(1);

    activeBattles[agentKey] = { poke, enemy, hbFill, hbBg, nodeKey, fullName };

    scene.tweens.add({
        targets: poke, x: '+=20', duration: 150, yoyo: true, repeat: -1,
        onYoyo: () => {
            if (hbFill.scaleX > 0) {
                hbFill.scaleX -= 0.05;
                enemy.setTint(0xff0000);
                scene.time.delayedCall(50, () => enemy.clearTint());
            } else {
                finishBattle(agentKey);
            }
        }
    });
}

function finishBattle(agentKey) {
    const scene = game.scene.scenes[0];
    const b = activeBattles[agentKey];
    updateLog(b.fullName, NODES[b.nodeKey].name, 'TASK_COMPLETE');

    b.enemy.destroy(); b.hbFill.destroy(); b.hbBg.destroy();

    scene.tweens.add({
        targets: b.poke, x: 50, y: beltBalls[agentKey].y,
        scale: 0.1, alpha: 0, duration: 700,
        onComplete: () => {
            b.poke.destroy();
            beltBalls[agentKey].ball.setVisible(true);
            beltBalls[agentKey].label.setAlpha(1);
            delete activeBattles[agentKey];
        }
    });
}

function update() {
    this.blue.y = 300 + Math.sin(this.time.now / 800) * 5;
}
</script>
</body>
</html>
