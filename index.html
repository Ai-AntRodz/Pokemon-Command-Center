<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw Command Center</title>
    <style>
        body { margin: 0; background: #01050a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { image-rendering: pixelated; border: 4px solid #112244; }
        #terminal-box { 
            position: absolute; bottom: 20px; right: 20px; width: 280px; height: 120px; 
            background: rgba(0, 8, 20, 0.95); border: 1px solid #00aaff; color: #00aaff; 
            font-family: monospace; font-size: 10px; padding: 8px; overflow: hidden;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<div id="terminal-box"><div id="log-content"></div></div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    pixelArt: true,
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// --- STRICT FILENAME MAPPING ---
// I have updated these to match your GitHub folder exactly
const PATH = 'gifs-Sprites/';
const AGENTS = [
    { key: 'snorlax', file: 'snorlaxOn.gif' },
    { key: 'rotom', file: 'rotomOn.gif' },
    { key: 'unown', file: 'unown-aOn.gif' },
    { key: 'smeargle', file: 'smeargleOn.gif' },
    { key: 'mewtwo', file: 'mewtwoOn.gif' },
    { key: 'ditto', file: 'dittoOn.gif' }
];

const ENEMIES = {
    LAPTOP: { key: 'codingOn', file: 'codingOn.gif', x: 250, y: 150, size: 80 },
    FLOPPY: { key: 'FLOPPYOn', file: 'FLOPPYOn.gif', x: 550, y: 150, size: 60 },
    TERM:   { key: 'terminalOnTest', file: 'terminalOnTest.webp', x: 400, y: 480, size: 100 }
};

function preload() {
    this.load.image('blue', PATH + 'trainerblue.gif');
    this.load.image('ball', 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png');
    
    // Load Agents
    AGENTS.forEach(a => this.load.image(a.key, PATH + a.file));
    
    // Load Enemies
    Object.values(ENEMIES).forEach(e => this.load.image(e.key, PATH + e.file));
}

let belt = {};
let activeTasks = {};

function create() {
    this.add.grid(400, 300, 800, 600, 40, 40, 0x000000, 0, 0x00aaff, 0.1);
    this.blue = this.add.image(400, 300, 'blue').setDisplaySize(60, 80);

    AGENTS.forEach((a, i) => {
        const y = 80 + (i * 85);
        const ball = this.add.image(50, y, 'ball').setDisplaySize(30, 30);
        const txt = this.add.text(75, y, a.key.toUpperCase(), {fontSize:'10px', color:'#00aaff'}).setOrigin(0,0.5);
        belt[a.key] = { ball, txt, y, isBusy: false };
    });

    // Safe Deployment Loop
    this.time.addEvent({ delay: 4000, callback: autoManager, callbackScope: this, loop: true });
}

function autoManager() {
    const freeAgent = AGENTS.find(a => !belt[a.key].isBusy);
    const freeNodeKey = Object.keys(ENEMIES).find(key => !activeTasks[key]);

    if (freeAgent && freeNodeKey) {
        deployAgent(freeAgent.key, freeNodeKey);
    }
}

function deployAgent(aKey, nKey) {
    const node = ENEMIES[nKey];
    const bItem = belt[aKey];
    bItem.isBusy = true;
    activeTasks[nKey] = true;
    
    bItem.ball.setAlpha(0.2);
    const flyBall = this.add.image(50, bItem.y, 'ball').setDisplaySize(30, 30);

    this.tweens.add({
        targets: flyBall,
        x: node.x, y: node.y,
        angle: 360, duration: 800,
        onComplete: () => {
            flyBall.destroy();
            startBattle.call(this, aKey, nKey);
        }
    });
}

function startBattle(aKey, nKey) {
    const node = ENEMIES[nKey];
    
    // Force exact pixel sizes to fix the "huge" scaling issue
    const enemy = this.add.image(node.x + 40, node.y, node.key).setDisplaySize(node.size, node.size);
    const agent = this.add.image(node.x - 40, node.y, aKey).setDisplaySize(50, 50);
    
    const hb = this.add.rectangle(node.x + 40, node.y - (node.size/2 + 10), 60, 4, 0x00ffaa);
    
    this.tweens.add({
        targets: agent,
        x: '+=20', duration: 200, yoyo: true, repeat: -1,
        onYoyo: () => {
            hb.width -= 3;
            enemy.setTint(0x00aaff);
            this.time.delayedCall(50, () => enemy.clearTint());
            if (hb.width <= 0) {
                this.tweens.killTweensOf(agent);
                enemy.destroy(); hb.destroy();
                finishMission.call(this, aKey, nKey, agent);
            }
        }
    });
}

function finishMission(aKey, nKey, sprite) {
    this.tweens.add({
        targets: sprite,
        x: 50, y: belt[aKey].y,
        alpha: 0, scale: 0, duration: 800,
        onComplete: () => {
            sprite.destroy();
            belt[aKey].isBusy = false;
            belt[aKey].ball.setAlpha(1);
            delete activeTasks[nKey];
        }
    });
}

function update() {
    this.blue.y = 300 + Math.sin(this.time.now / 1000) * 5;
}
</script>
</body>
</html>
