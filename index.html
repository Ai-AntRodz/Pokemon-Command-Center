<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw Command Center - v7</title>
    <style>
        body { margin: 0; background: #01050a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { image-rendering: pixelated; border: 4px solid #112244; }
        #terminal-box { 
            position: absolute; bottom: 20px; right: 20px; width: 280px; height: 120px; 
            background: rgba(0, 8, 20, 0.95); border: 1px solid #00aaff; color: #00aaff; 
            font-family: monospace; font-size: 10px; padding: 8px; overflow: hidden;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<div id="terminal-box"><div id="log-content"></div></div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    pixelArt: true,
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

const PATH = 'gifs-Sprites/';

// --- HARD SCALE DICTIONARY ---
// Tweak 'w' and 'h' here to fix the Floppy or any other giant GIFs
const ASSET_SCALES = {
    // Agents
    'snorlax': { w: 50, h: 50 },
    'rotom':   { w: 45, h: 45 },
    'unown':   { w: 40, h: 40 },
    'smeargle':{ w: 50, h: 50 },
    'mewtwo':  { w: 55, h: 65 },
    'ditto':   { w: 45, h: 40 },
    // Enemies
    'codingOn':       { w: 60, h: 60 },
    'FLOPPYOn':       { w: 40, h: 40 }, // Shrink Floppy significantly
    'terminalOnTest': { w: 80, h: 80 },
    // UI
    'blue': { w: 60, h: 80 },
    'ball': { w: 30, h: 30 }
};

const AGENTS = [
    { key: 'snorlax', file: 'snorlaxOn.gif' },
    { key: 'rotom', file: 'rotomOn.gif' },
    { key: 'unown', file: 'unown-aOn.gif' },
    { key: 'smeargle', file: 'smeargleOn.gif' },
    { key: 'mewtwo', file: 'mewtwoOn.gif' },
    { key: 'ditto', file: 'dittoOn.gif' }
];

const ENEMIES = {
    LAPTOP: { key: 'codingOn', file: 'codingOn.gif', x: 250, y: 150 },
    FLOPPY: { key: 'FLOPPYOn', file: 'FLOPPYOn.gif', x: 550, y: 150 },
    TERM:   { key: 'terminalOnTest', file: 'terminalOnTest.webp', x: 400, y: 480 }
};

function preload() {
    this.load.image('blue', PATH + 'trainerblue.gif');
    this.load.image('ball', 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png');
    AGENTS.forEach(a => this.load.image(a.key, PATH + a.file));
    Object.values(ENEMIES).forEach(e => this.load.image(e.key, PATH + e.file));
}

let belt = {};
let activeTasks = {};

function create() {
    this.add.grid(400, 300, 800, 600, 40, 40, 0x000000, 0, 0x00aaff, 0.1);
    
    // Scale Blue using the dictionary
    const bScale = ASSET_SCALES['blue'];
    this.blue = this.add.image(400, 300, 'blue').setDisplaySize(bScale.w, bScale.h);

    AGENTS.forEach((a, i) => {
        const y = 80 + (i * 85);
        const ball = this.add.image(50, y, 'ball').setDisplaySize(30, 30);
        const txt = this.add.text(75, y, a.key.toUpperCase(), {fontSize:'10px', color:'#00aaff'}).setOrigin(0,0.5);
        belt[a.key] = { ball, txt, y, isBusy: false };
    });

    // Deploy every 4 seconds
    this.time.addEvent({ delay: 4000, callback: autoManager, callbackScope: this, loop: true });
}

function autoManager() {
    // 1. Get all available (not busy) agents
    const availableAgents = AGENTS.filter(a => !belt[a.key].isBusy);
    
    // 2. Get all empty nodes
    const freeNodes = Object.keys(ENEMIES).filter(key => !activeTasks[key]);

    if (availableAgents.length > 0 && freeNodes.length > 0) {
        // Pick a random agent to ensure Mewtwo/Ditto get picked
        const randomAgent = availableAgents[Math.floor(Math.random() * availableAgents.length)];
        const randomNode = freeNodes[Math.floor(Math.random() * freeNodes.length)];
        deployAgent.call(this, randomAgent.key, randomNode);
    }
}

function deployAgent(aKey, nKey) {
    const node = ENEMIES[nKey];
    const bItem = belt[aKey];
    bItem.isBusy = true;
    activeTasks[nKey] = true;
    
    bItem.ball.setAlpha(0.2);
    const flyBall = this.add.image(50, bItem.y, 'ball').setDisplaySize(30, 30);

    this.tweens.add({
        targets: flyBall,
        x: node.x, y: node.y,
        angle: 360, duration: 800,
        onComplete: () => {
            flyBall.destroy();
            startBattle.call(this, aKey, nKey);
        }
    });
}

function startBattle(aKey, nKey) {
    const nodeData = ENEMIES[nKey];
    const eScale = ASSET_SCALES[nodeData.key];
    const pScale = ASSET_SCALES[aKey];
    
    // Generate fresh Health Bar (Resetting it to 60px wide)
    const enemy = this.add.image(nodeData.x + 40, nodeData.y, nodeData.key).setDisplaySize(eScale.w, eScale.h);
    const agent = this.add.image(nodeData.x - 40, nodeData.y, aKey).setDisplaySize(pScale.w, pScale.h);
    const hb = this.add.rectangle(nodeData.x + 40, nodeData.y - (eScale.h/2 + 10), 60, 4, 0x00ffaa);
    
    this.tweens.add({
        targets: agent,
        x: '+=20', duration: 200, yoyo: true, repeat: -1,
        onYoyo: () => {
            hb.width -= 4; // Damage per hit
            enemy.setTint(0x00aaff);
            this.time.delayedCall(50, () => enemy.clearTint());
            
            if (hb.width <= 0) {
                this.tweens.killTweensOf(agent);
                enemy.destroy(); 
                hb.destroy();
                finishMission.call(this, aKey, nKey, agent);
            }
        }
    });
}

function finishMission(aKey, nKey, sprite) {
    this.tweens.add({
        targets: sprite,
        x: 50, y: belt[aKey].y,
        alpha: 0, scale: 0, duration: 800,
        onComplete: () => {
            sprite.destroy();
            belt[aKey].isBusy = false;
            belt[aKey].ball.setAlpha(1);
            delete activeTasks[nKey]; // Node is now free for a new, fresh health bar
        }
    });
}

function update() {
    this.blue.y = 300 + Math.sin(this.time.now / 1000) * 5;
}
</script>
</body>
</html>
